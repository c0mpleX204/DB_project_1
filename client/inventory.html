<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>票务系统 - Inventory</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-shape"></div>
    <main class="page">
      <header class="hero">
        <h1>Inventory - 机票管理</h1>
        <p>调用 /api/v1/tickets 与 /api/v1/tickets/generate</p>
        <nav class="top-nav">
          <a class="nav-link" href="./index.html">Dashboard</a>
          <a class="nav-link" href="./flights.html">Flights</a>
          <a class="nav-link active" href="./inventory.html">Inventory</a>
          <a class="nav-link" href="./orders.html">Orders</a>
        </nav>
      </header>

      <section class="panel">
        <h2>按日期范围自动生成机票</h2>
        <form id="generate-form" class="inline-fields">
          <label>开始日期 <input id="start-date" type="date" required /></label>
          <label>结束日期 <input id="end-date" type="date" required /></label>
          <button type="submit">自动生成机票</button>
        </form>
      </section>

      <section class="panel">
        <h2>新增机票</h2>
        <form id="create-form" class="inline-fields">
          <label>flight_id <input id="c-flight-id" type="number" min="1" required /></label>
          <label>flight_date <input id="c-flight-date" type="date" required /></label>
          <label>business_price <input id="c-b-price" type="number" step="0.01" min="0" required /></label>
          <label>business_remain <input id="c-b-remain" type="number" min="0" required /></label>
          <label>economy_price <input id="c-e-price" type="number" step="0.01" min="0" required /></label>
          <label>economy_remain <input id="c-e-remain" type="number" min="0" required /></label>
          <button type="submit">新增</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>机票列表（前 200 条）</h2>
          <button id="btn-refresh" type="button">刷新</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ticket_id</th>
                <th>flight_id</th>
                <th>flight_date</th>
                <th>economy(余/价)</th>
                <th>business(余/价)</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="inv-body">
              <tr><td colspan="6" style="text-align:center;color:gray;">暂无数据</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>系统日志</h2>
        <pre id="log" class="log-box">等待操作...</pre>
      </section>
    </main>

    <script type="module" src="./js/inventory.js"></script>
  </body>
</html>
